<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script>
  // Set data-theme before any CSS is applied to prevent flash of wrong theme.
  // color_scheme: dark is compiled as the base, so dark renders instantly.
  // Only light mode needs the override here.
  (function () {
    var saved = localStorage.getItem('docs-theme');
    var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', saved || preferred);
  }());
</script>
<!-- Guard against light-mode flash for users who switched to light.
     Dark renders natively from compiled CSS; light needs an instant override. -->
<style>
  html[data-theme="light"] body,
  html[data-theme="light"] .main { background-color: #ffffff !important; }
  html[data-theme="light"] .side-bar,
  html[data-theme="light"] .site-header { background-color: #f7faff !important; }
  html[data-theme="light"] .main-header { background-color: #ffffff !important; }
</style>
<script defer src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
