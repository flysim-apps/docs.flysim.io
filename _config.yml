title: FlyAround Simulations
description: Official documentation and user guides for FlyAround — flight tracking and management for MSFS 2020/2024, X-Plane 11/12, and Prepar3D.
baseurl: ""
url: "https://docs.flysim.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

# Site logo and favicon
# logo: "/assets/images/logo.png"

# Dark is compiled as the base so pages render dark instantly on load.
# Light mode is applied via html[data-theme="light"] in custom.scss.
color_scheme: dark

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Aux links (top-right nav)
aux_links:
  "FlyAround ↗":
    - "https://flysim.io"

aux_links_new_tab: true

# Footer
footer_content: "© 2026 FlyAround Simulations LLC. Built with <a href=\"https://github.com/just-the-docs/just-the-docs\">Just the Docs</a>."

# Heading anchor links
heading_anchors: true

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Last edit timestamp
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - CLAUDE.md
  - README.md
  - Gemfile
  - Gemfile.lock
